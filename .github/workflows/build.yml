name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lockb', 'frontend/package.json') }}

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run tsc --noEmit
          bun run vite build

      - name: Copy frontend dist
        run: |
          rm -rf internal/routes/dist
          mkdir -p internal/routes/dist
          cp -r frontend/dist/* internal/routes/dist/

      - name: Build backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOEXPERIMENT: greenteagc
        run: |
          go build -trimpath -ldflags="-s -w -buildid=" \
            -o zvkr-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            cmd/gate/main.go

      - name: Upload release file
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: zvkr-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
